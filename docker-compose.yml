# Optional: run Redis locally for the BullMQ worker queue.
# Postgres lives in Supabase, so it's not in this file.
#
# Start:  docker compose up -d
# Stop:   docker compose down
#
# Alternative (no Docker):
#   macOS:   brew install redis && brew services start redis
#   Ubuntu:  sudo apt install redis-server && sudo systemctl enable --now redis-server
services:
  redis:
    image: redis:7-alpine
    container_name: storyflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
